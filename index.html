<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Ranger Mega-App</title>
    <style>
        :root { --primary: #2c5e2e; --accent: #d4af37; --bg: #f4f1ea; --text: #2b2b2b; --locked: #8b0000; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid var(--primary); }
        .locked-card { border-left-color: var(--locked); background: #fff5f5; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; margin: 5px 0; font-weight: bold; }
        .btn-confirm { background: #28a745; }
        .btn-cancel { background: #dc3545; }
        
        /* Modal Overlay */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; width: 85%; padding: 20px; border-radius: 15px; text-align: center; }
        
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; text-align: center; font-size: 0.9em; }
        .feature-item { padding: 8px; border-bottom: 1px solid #eee; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="char-name">Marco Ocala</h2>
        <div class="stat-grid">
            <div><strong>Level</strong><br><span id="val-lv">1</span></div>
            <div><strong>HP</strong><br><span id="val-hp">10</span></div>
            <div><strong>Prof.</strong><br>+<span id="val-prof">2</span></div>
        </div>
    </div>

    <div class="card">
        <h3>Class Features (Set in Stone)</h3>
        <div id="feature-list">
            <div class="feature-item">Lv 1: Favored Enemy</div>
            <div class="feature-item">Lv 1: Natural Explorer</div>
        </div>
    </div>
    <div class="card" id="spellbook-zone">
    <h3>Ranger Spellbook</h3>
    <div id="spell-list">
        <p style="font-size: 0.8em; color: #666;">Unlock level 2 to choose spells.</p>
    </div>
</div>

<div class="card" id="choice-zone" style="display:none;">
    <h3 id="choice-title">Special Decision</h3>
    <div id="choice-buttons"></div>
</div>

    <button class="btn" id="lvl-btn" onclick="askLevelUp()">LEVEL UP TO <span id="next-lv-num">2</span></button>

    <div id="modal-overlay">
        <div class="modal-box">
            <h2 id="modal-title">Confirm Choice</h2>
            <p id="modal-text">This action is permanent.</p>
            <div id="choice-options"></div>
            <button class="btn btn-confirm" id="final-confirm-btn">SET IN STONE</button>
            <button class="btn btn-cancel" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

    <script>
        // THE RANGER MEGA-DATA LIBRARY
const RANGER_DATA = {
    subclasses: {
        "Hunter": { features: { 3: "Hunter's Prey", 7: "Defensive Tactics", 11: "Multiattack", 15: "Superior Hunter's Defense" } },
        "Beast Master": { features: { 3: "Ranger's Companion", 7: "Exceptional Training", 11: "Bestial Fury", 15: "Share Spells" } },
        "Gloom Stalker": { features: { 3: "Dread Ambusher/Umbral Sight", 7: "Iron Mind", 11: "Stalker's Flurry", 15: "Shadowy Dodge" } },
        "Horizon Walker": { features: { 3: "Planar Warrior", 7: "Ethereal Step", 11: "Distant Strike", 15: "Spectral Defense" } },
        "Monster Slayer": { features: { 3: "Slayer's Hunter/Sense", 7: "Supernatural Defense", 11: "Magic-User's Nemesis", 15: "Slayer's Counter" } },
        "Fey Wanderer": { features: { 3: "Dreadful Strike/Otherworldly Glamour", 7: "Beguiling Twist", 11: "Fey Reinforcements", 15: "Misty Wanderer" } },
        "Swarmkeeper": { features: { 3: "Gathered Swarm", 7: "Wrath of Nature", 11: "Mighty Swarm", 15: "Swarming Dispersal" } },
        "Drakewarden": { features: { 3: "Draconic Gift/Drake Companion", 7: "Bond of Fang and Scale", 11: "Drake's Breath", 15: "Perfected Bond" } }
    },
    spells: {
        1: ["Alarm", "Animal Friendship", "Cure Wounds", "Detect Magic", "Ensnaring Strike", "Fog Cloud", "Goodberry", "Hail of Thorns", "Hunter's Mark", "Longstrider", "Speak with Animals"],
        2: ["Barkskin", "Beast Sense", "Darkvision", "Lesser Restoration", "Locate Object", "Pass Without Trace", "Silence", "Spike Growth"],
        3: ["Conjure Animals", "Conjure Barrage", "Daylight", "Lightning Arrow", "Nondetection", "Plant Growth", "Water Walk"],
        4: ["Freedom of Movement", "Grasping Vine", "Locate Creature", "Stoneskin"],
        5: ["Commune with Nature", "Conjure Volley", "Swift Quiver", "Tree Stride"]
    }
};

let marco = {
    level: 1,
    hp: 12,
    subclass: null,
    lockedFeatures: ["Favored Enemy", "Natural Explorer"],
    spellsKnown: ["Hunter's Mark"],
    choices: {} // For tactics like Colossus Slayer
};

// SAFETY LOCK ENGINE
function requestChange(type, detail, callback) {
    const modal = document.getElementById('modal-overlay');
    document.getElementById('modal-title').innerText = "SET IN STONE?";
    document.getElementById('modal-text').innerText = `You are choosing: ${detail}. This decision cannot be undone.`;
    modal.style.display = 'flex';
    
    document.getElementById('final-confirm-btn').onclick = () => {
        callback();
        modal.style.display = 'none';
        saveAndRefresh();
    };
}

function askLevelUp() {
    let next = marco.level + 1;
    requestChange("Level Up", `Level ${next}`, () => {
        marco.level = next;
        marco.hp += 8; // Avg 6 + 2 Con
        if(next === 3) promptSubclass();
    });
}

function promptSubclass() {
    let list = Object.keys(RANGER_DATA.subclasses).join(", ");
    // In a full app, this would be a dropdown, but for logic:
    let choice = prompt("Choose your Subclass: " + list);
    if(RANGER_DATA.subclasses[choice]) {
        marco.subclass = choice;
    }
}

function saveAndRefresh() {
    localStorage.setItem('marco_mega_sheet', JSON.stringify(marco));
    updateUI();
}

function updateUI() {
    document.getElementById('val-lv').innerText = marco.level;
    document.getElementById('val-hp').innerText = marco.hp;
    document.getElementById('val-prof').innerText = Math.ceil(1 + (marco.level / 4));
    
    // 1. Update Features (Set in Stone list)
    let list = document.getElementById('feature-list');
    list.innerHTML = marco.lockedFeatures.map(f => `<div class="feature-item">🔒 ${f}</div>`).join('');

    // 2. Update Spellbook (Unlocks at Level 2)
    let spellZone = document.getElementById('spell-list');
    if (marco.level >= 2) {
        let available = RANGER_DATA.spells[1] || []; 
        spellZone.innerHTML = available.map(s => 
            `<button class="btn" style="background:#4a7c4c; font-size:0.8em; margin:2px;" onclick="learnSpell('${s}')">${s}</button>`
        ).join('');
    }

    // 3. Hunter Tactics (Appears at Level 3 if you are a Hunter)
    const choiceZone = document.getElementById('choice-zone');
    if (marco.subclass === "Hunter" && marco.level >= 3 && !marco.choices['Hunter-Prey']) {
        choiceZone.style.display = 'block';
        document.getElementById('choice-title').innerText = "Select Hunter's Prey";
        let tactics = ["Colossus Slayer", "Giant Killer", "Horde Breaker"];
        document.getElementById('choice-buttons').innerHTML = tactics.map(t => 
            `<button class="btn" onclick="requestChange('Tactic', '${t}', () => { marco.choices['Hunter-Prey'] = '${t}'; marco.lockedFeatures.push('Hunter: ${t}'); })">${t}</button>`
        ).join('');
    } else {
        choiceZone.style.display = 'none';
    }
}

// Helper to handle permanent spell learning
function learnSpell(spellName) {
    if (marco.spellsKnown.includes(spellName)) return;
    requestChange("Learn Spell", spellName, () => {
        marco.spellsKnown.push(spellName);
        marco.lockedFeatures.push(`Spell: ${spellName}`);
    });
}
        function load() {
    let d = localStorage.getItem('marco_mega_sheet');
    if (d) { marco = JSON.parse(d); updateUI(); }
}
window.onload = load;
</script>
</html>
