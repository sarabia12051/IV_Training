<head>
    <meta charset="UTF-8">

    <title>IV Auditor Pro: 151 Edition</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 10px 0; font-size: 1rem; color: #ff5252; text-transform: uppercase; border-bottom: 1px solid #444; padding-bottom: 5px; }
        label { display: block; font-size: 0.7rem; margin-top: 8px; color: #aaa; text-transform: uppercase; font-weight: bold; }
        select, input { width: 100%; padding: 10px; background: #252525; border: 1px solid #444; color: white; border-radius: 6px; margin-top: 4px; font-size: 1rem; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { background: #ff5252; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: 900; margin-top: 15px; cursor: pointer; font-size: 1rem; letter-spacing: 1px; }
        .log-box { background: #000; padding: 12px; border-radius: 8px; font-family: 'Courier New', monospace; border: 1px solid #444; margin-top: 10px; }
        .stat-line { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; }
        .iv-range { color: #29b6f6; font-weight: bold; }
        .high-iv { color: #00e676; text-shadow: 0 0 5px rgba(0,230,118,0.3); }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:#ff5252; font-size: 1.5rem; letter-spacing: 3px;">IV AUDITOR 151</h1>

    <div class="card">

        <label>Species</label>
        <select id="myPkmn"></select>
        
        <label>Nature</label>
        <select id="natureSel"></select>

        <div class="grid">
            <div><label>Level</label><input type="number" id="lvl" value="5"></div>
            <div><label>HP Stat</label><input type="number" id="sHP" placeholder="HP"></div>
            <div><label>Atk Stat</label><input type="number" id="sAtk" placeholder="Atk"></div>
            <div><label>Def Stat</label><input type="number" id="sDef" placeholder="Def"></div>
            <div><label>SpA Stat</label><input type="number" id="sSpA" placeholder="SpA"></div>
            <div><label>SpD Stat</label><input type="number" id="sSpD" placeholder="SpD"></div>
            <div><label>Spe Stat</label><input type="number" id="sSpe" placeholder="Spe"></div>
        </div>
        <button onclick="runAudit()">RUN SYSTEM AUDIT</button>
    </div>

    <div class="card">
        <h2>2. Audit Results</h2>
        <div id="auditDisplay" class="log-box">Awaiting DNA string...</div>
    </div>
</div>

const natures = {
    Adamant:{atk:1.1,spa:0.9}, Bashful:{}, Bold:{def:1.1,atk:0.9}, Brave:{atk:1.1,spe:0.9}, Calm:{spd:1.1,atk:0.9}, Careful:{spd:1.1,spa:0.9}, Docile:{}, Gentle:{spd:1.1,def:0.9}, Hardy:{}, Hasty:{spe:1.1,def:0.9}, Impish:{def:1.1,spa:0.9}, Jolly:{spe:1.1,spa:0.9}, Lax:{def:1.1,spd:0.9}, Lonely:{atk:1.1,def:0.9}, Mild:{spa:1.1,def:0.9}, Modest:{spa:1.1,atk:0.9}, Naive:{spe:1.1,spd:0.9}, Naughty:{atk:1.1,spd:0.9}, Quiet:{spa:1.1,spe:0.9}, Quirky:{}, Rash:{spa:1.1,spd:0.9}, Relaxed:{def:1.1,spe:0.9}, Sassy:{spd:1.1,spe:0.9}, Serious:{}, Timid:{spe:1.1,atk:0.9}

const pSel = document.getElementById('myPkmn');
const nSel = document.getElementById('natureSel');
Object.keys(pkmnData).forEach(p => pSel.add(new Option(p,p)));
Object.keys(natures).forEach(n => nSel.add(new Option(n,n)));

function runAudit() {
    const lvl = parseInt(document.getElementById('lvl').value);
    const nature = natures[nSel.value];
    const base = pkmnData[pSel.value];
    const stats = [
        parseInt(document.getElementById('sHP').value), parseInt(document.getElementById('sAtk').value),
        parseInt(document.getElementById('sDef').value), parseInt(document.getElementById('sSpA').value),
        parseInt(document.getElementById('sSpD').value), parseInt(document.getElementById('sSpe').value)
    ];

    let output = "<b>AUDIT LOG (LEVEL "+lvl+"):</b><br>";
    const labels = ['HP', 'ATK', 'DEF', 'SPA', 'SPD', 'SPE'];

    labels.forEach((label, i) => {
        let possible = [];
        let multiplier = nature[label.toLowerCase()] || 1.0;

        for (let iv = 0; iv <= 31; iv++) {
            let val;
            if (i === 0) {
                val = Math.floor(((base[i] * 2 + iv) * lvl) / 100) + lvl + 10;
            } else {
                val = Math.floor((Math.floor(((base[i] * 2 + iv) * lvl) / 100) + 5) * multiplier);
            }
            if (val === stats[i]) possible.push(iv);
        }

        let range = possible.length > 0 ? (possible[0] === possible[possible.length-1] ? possible[0] : possible[0] + "-" + possible[possible.length-1]) : "INV";
        let colorClass = (possible[possible.length-1] > 25) ? "high-iv" : "";
        output += `<div class="stat-line"><span>${label}</span> <span class="iv-range ${colorClass}">${range}</span></div>`;
    });

    document.getElementById('auditDisplay').innerHTML = output;
}
