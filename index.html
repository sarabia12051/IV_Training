<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Hunter Ranger</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e7d32">

    <style>
        :root { --primary: #2e7d32; --gold: #fbc02d; --bg: #0a0f0b; --card: #1b261e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #e8f5e9; display: flex; justify-content: center; padding: 10px; margin: 0; }
        
        .container { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 15px; 
            border: 2px solid var(--primary); 
            width: 100%; 
            max-width: 420px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            box-sizing: border-box; 
        }

        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stat-box { background: #0c140e; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid var(--primary); }
        .stat-box b { color: var(--gold); font-size: 1.2em; display: block; }
        
        button { background: var(--primary); border: none; padding: 16px; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        .hidden { display: none; }

        select, input { 
            width: 100%; 
            padding: 12px 15px; 
            margin: 8px 0; 
            background: #050a06; 
            color: white; 
            border: 1px solid var(--primary); 
            border-radius: 8px; 
            font-size: 1rem; 
            box-sizing: border-box; 
            appearance: none; 
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%232e7d32%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }
        
        input { background-image: none; }

        #modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); padding: 25px; border: 3px solid var(--gold); border-radius: 15px; z-index: 100; width: 85%; max-width: 350px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99; }
        .feature-item { margin-bottom: 10px; padding: 12px; border-left: 4px solid var(--gold); background: rgba(255,255,255,0.05); border-radius: 4px; font-size: 0.9em; }
        .feature-item b { color: var(--gold); display: block; margin-bottom: 4px; }
        
        .header-title { color: var(--primary); text-align: center; margin-bottom: 20px; font-size: 2.2em; font-weight: bold; text-transform: uppercase; letter-spacing: 4px; }
    </style>
</head>
<body>

<div id="setup-screen" class="container">
    <div class="header-title">RANGER</div>
    <input type="text" id="char-name" placeholder="Character Name...">
    
    <label style="font-size: 0.8em; color: var(--primary); font-weight: bold;">SELECT LINEAGE</label>
    <select id="race-select">
        <option value="Human">Human (+1 All Stats)</option>
        <option value="Elf">Elf (+2 Dex, Darkvision)</option>
        <option value="Wood Elf">Wood Elf (+2 Dex, +1 Wis)</option>
        <option value="Dwarf">Dwarf (+2 Con, Tough)</option>
        <option value="Halfling">Halfling (+2 Dex, Lucky)</option>
        <option value="Gnome">Gnome (+2 Int, Cunning)</option>
        <option value="Dragonborn">Dragonborn (+2 Str, +1 Cha)</option>
        <option value="Tiefling">Tiefling (+2 Cha, +1 Int)</option>
        <option value="Half-Orc">Half-Orc (+2 Str, +1 Con)</option>
        <option value="Aasimar">Aasimar (+2 Cha, +1 Wis)</option>
    </select>

    <label style="font-size: 0.8em; color: var(--primary); font-weight: bold;">SELECT BACKGROUND</label>
    <select id="bg-select">
        <option value="Wayfarer">Wayfarer (Feat: Alert)</option>
        <option value="Soldier">Soldier (Feat: Savage Attacker)</option>
        <option value="Acolyte">Acolyte (Feat: Magic Initiate)</option>
        <option value="Criminal">Criminal (Feat: Alert)</option>
        <option value="Outlander">Outlander (Feat: Tough)</option>
        <option value="Sage">Sage (Feat: Magic Initiate)</option>
        <option value="Noble">Noble (Feat: Skilled)</option>
    </select>

    <button onclick="generateCharacter()">GENERATE HUNTER</button>
</div>

<div id="main-sheet" class="container hidden">
    <h1 id="disp-name" style="margin:0; font-size: 1.5em; text-align:center;"></h1>
    <p style="text-align:center; color:#888; margin-top:5px;">
        Level <span id="disp-lvl"></span> <span id="disp-race"></span> Hunter (<span id="disp-bg"></span>)
    </p>

    <div class="stat-grid" id="stat-display"></div>

    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <div class="stat-box" style="flex:2; border-color:var(--gold);">HP: <strong id="disp-hp"></strong></div>
        <div class="stat-box" style="flex:1;">AC: <strong id="disp-ac"></strong></div>
        <div class="stat-box" style="flex:1;">Prof: <strong id="disp-prof"></strong></div>
    </div>

    <strong>Abilities & Features:</strong>
    <div id="features-list" style="margin-top:10px; height: 280px; overflow-y: auto;"></div>

    <button onclick="triggerLevelUp()">LEVEL UP</button>
    <button style="background:#422; margin-top:20px; font-size: 0.8em;" onclick="reset()">DELETE CHARACTER</button>
</div>

<div id="modal-overlay" class="overlay hidden"></div>
<div id="modal" class="hidden">
    <h2 id="modal-title" style="color:var(--gold); margin-top:0;">Level Up</h2>
    <div id="modal-content"></div>
    <button onclick="confirmLevelUp()">APPLY CHANGES</button>
</div>

<script>
    let hero = null;
    const rangerBook = {
        2: { title: "Fighting Style", options: { "Archery": "+2 to ranged attacks.", "Defense": "+1 to AC.", "Dueling": "+2 to melee dmg (1h)." }},
        3: { title: "Hunter's Prey", options: { "Colossus Slayer": "Deal +1d8 if target is hurt.", "Giant Killer": "Counter-attack large foes.", "Horde Breaker": "Extra attack on nearby foe." }},
        7: { title: "Defensive Tactics", options: { "Escape the Horde": "Opp-attacks have Disadvantage.", "Multiattack Defense": "Hit once? +4 AC after.", "Steel Will": "Adv vs Fear." }},
        11: { title: "Multiattack", options: { "Volley": "AoE Ranged Attack.", "Whirlwind": "AoE Melee Attack." }},
        15: { title: "Superior Defense", options: { "Evasion": "Dodge AoE spells.", "Stand Against Tide": "Missed? Make them hit others.", "Uncanny Dodge": "Halve damage taken." }},
        "ASI": { title: "Stat Increase", options: { "DEX": "Dexterity +2", "WIS": "Wisdom +2", "CON": "Constitution +2" }}
    };

    const bgFeats = { "Wayfarer": "Alert", "Soldier": "Savage Attacker", "Acolyte": "Magic Initiate", "Criminal": "Alert", "Outlander": "Tough", "Sage": "Magic Initiate", "Noble": "Skilled" };

    function rollStat() {
        let rolls = [rand(6), rand(6), rand(6), rand(6)];
        rolls.sort().shift();
        return rolls.reduce((a, b) => a + b, 0);
    }
    function rand(m) { return Math.floor(Math.random() * m) + 1; }

    function generateCharacter() {
        let r = document.getElementById('race-select').value;
        let b = document.getElementById('bg-select').value;
        hero = {
            name: document.getElementById('char-name').value || "Strider",
            race: r, bg: b, level: 1, prof: 2,
            stats: { STR: rollStat(), DEX: rollStat(), CON: rollStat(), INT: rollStat(), WIS: rollStat(), CHA: rollStat() },
            feats: [{name: "Origin Feat: " + bgFeats[b], text: "Specialized training from your background."}]
        };
        
        // Comprehensive Race Logic
        if(r === "Human") Object.keys(hero.stats).forEach(s => hero.stats[s]++);
        if(r.includes("Elf") || r === "Halfling") hero.stats.DEX += 2;
        if(r === "Wood Elf" || r === "Aasimar") hero.stats.WIS += 1;
        if(r === "Dwarf") hero.stats.CON += 2;
        if(r === "Gnome") hero.stats.INT += 2;
        if(r === "Dragonborn") { hero.stats.STR += 2; hero.stats.CHA += 1; }
        if(r === "Tiefling") { hero.stats.CHA += 2; hero.stats.INT += 1; }
        if(r === "Half-Orc") { hero.stats.STR += 2; hero.stats.CON += 1; }
        if(r === "Aasimar") hero.stats.CHA += 2;

        hero.maxHP = 10 + Math.floor((hero.stats.CON-10)/2);
        if(b === "Outlander" || r === "Dwarf") hero.maxHP += 2;
        hero.currentHP = hero.maxHP;
        hero.feats.push({name: "Favored Enemy", text: "Expertise in tracking foes."});
        save();
    }

    function triggerLevelUp() {
        if(hero.level >= 20) return;
        let next = hero.level + 1;
        document.getElementById('modal-overlay').classList.remove('hidden');
        document.getElementById('modal').classList.remove('hidden');
        let key = [4,8,12,16,19].includes(next) ? "ASI" : next;
        let content = document.getElementById('modal-content');
        if(rangerBook[key]) {
            let html = `<p><b>${rangerBook[key].title}</b></p><select id="choice">`;
            for(let o in rangerBook[key].options) html += `<option value="${o}">${o}</option>`;
            content.innerHTML = html + `</select>`;
        } else {
            content.innerHTML = `<p>Gaining Ranger Level ${next}...</p><input type="hidden" id="choice" value="General">`;
        }
    }

    function confirmLevelUp() {
        let c = document.getElementById('choice').value;
        hero.level++;
        if(hero.stats[c]) hero.stats[c] += 2;
        if(rangerBook[hero.level]) hero.feats.push({name: c, text: rangerBook[hero.level].options[c]});
        if(hero.level === 5) hero.feats.push({name: "Extra Attack", text: "Attack twice per action."});
        if(hero.level === 10) hero.feats.push({name: "Vanish", text: "Hide as a Bonus Action."});
        if([5,9,13,17].includes(hero.level)) hero.prof++;
        hero.maxHP += (6 + Math.floor((hero.stats.CON-10)/2));
        hero.currentHP = hero.maxHP;
        document.getElementById('modal-overlay').classList.add('hidden');
        document.getElementById('modal').classList.add('hidden');
        save();
    }

    function save() { localStorage.setItem('ultraRangerSave', JSON.stringify(hero)); render(); }
    function render() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('main-sheet').classList.remove('hidden');
        document.getElementById('disp-name').innerText = hero.name;
        document.getElementById('disp-race').innerText = hero.race;
        document.getElementById('disp-bg').innerText = hero.bg;
        document.getElementById('disp-lvl').innerText = hero.level;
        document.getElementById('disp-hp').innerText = `${hero.currentHP}/${hero.maxHP}`;
        document.getElementById('disp-prof').innerText = `+${hero.prof}`;
        document.getElementById('disp-ac').innerText = 12 + Math.floor((hero.stats.DEX-10)/2);
        let sDiv = document.getElementById('stat-display');
        sDiv.innerHTML = "";
        for(let s in hero.stats) {
            let m = Math.floor((hero.stats[s]-10)/2);
            sDiv.innerHTML += `<div class="stat-box"><small>${s}</small><b>${hero.stats[s]}</b><small>${m>=0?'+':''}${m}</small></div>`;
        }
        document.getElementById('features-list').innerHTML = hero.feats.map(f => `<div class="feature-item"><b>${f.name}</b>${f.text}</div>`).reverse().join("");
    }

    window.onload = function() {
        let s = localStorage.getItem('ultraRangerSave');
        if(s) { hero = JSON.parse(s); render(); }
    };
    function reset() { if(confirm("Retire this Hunter?")) { localStorage.removeItem('ultraRangerSave'); location.reload(); } }
</script>
</body>
</html>
